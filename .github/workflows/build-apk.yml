name: Build WebView APK

on:
  push:
    tags: ['v*']  # 只有打 tag 时才触发构建
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.1.88)'
        required: true
        default: '1.1.88'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，包括所有 tag

      - name: Calculate version from tag
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # 从 tag 提取版本号 (v1.1.88 → 1.1.88)
            TAG=${{ github.ref_name }}
            VERSION=${TAG#v}
          else
            # 手动触发时使用输入版本
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12266719'
          packages: 'platforms;android-36 build-tools;35.0.0 platform-tools'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: |
          rm -rf dist-webview
          npx vite build --config vite.config.webview.js

      - name: Copy assets to Android project
        run: |
          rm -rf webview-app/app/src/main/assets/web
          mkdir -p webview-app/app/src/main/assets/web
          cp -r dist-webview/* webview-app/app/src/main/assets/web/
          mv webview-app/app/src/main/assets/web/index-webview.html webview-app/app/src/main/assets/web/index.html

      - name: Verify keystore exists
        run: |
          ls -la android-ci/ci.keystore

      - name: Grant Gradle permission
        run: chmod +x webview-app/gradlew

      - name: Build APK with Gradle
        working-directory: ./webview-app
        run: ./gradlew clean assembleRelease --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Verify APK
        run: |
          ls -la webview-app/app/build/outputs/apk/release/
          ${ANDROID_SDK_ROOT}/build-tools/35.0.0/aapt2 dump badging webview-app/app/build/outputs/apk/release/app-release.apk | grep -E 'version|package'

      - name: Rename APK with version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp webview-app/app/build/outputs/apk/release/app-release.apk "webview-app/app/build/outputs/apk/release/weknora-mobile-${VERSION}.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weknora-mobile-apk-${{ github.run_number }}
          path: webview-app/app/build/outputs/apk/release/weknora-mobile-*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "WeKnora Mobile ${{ steps.version.outputs.version }}"
          files: webview-app/app/build/outputs/apk/release/weknora-mobile-*.apk
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
