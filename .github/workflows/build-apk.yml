name: Build WebView APK

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.1.7)'
        required: true
        default: '1.1.7'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '18'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12266719'
          packages: 'platforms;android-36 build-tools;35.0.0 platform-tools'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: |
          rm -rf dist-webview
          npx vite build --config vite.config.webview.js

      - name: Copy assets to Android project
        run: |
          rm -rf webview-app/app/src/main/assets/web
          mkdir -p webview-app/app/src/main/assets/web
          cp -r dist-webview/* webview-app/app/src/main/assets/web/
          mv webview-app/app/src/main/assets/web/index-webview.html webview-app/app/src/main/assets/web/index.html

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Build APK
        working-directory: ./webview-app
        run: |
          chmod +x gradlew
          ./gradlew clean assembleRelease

      - name: Generate signing key
        env:
          KEYSTORE_PASS: weknora123
        run: |
          keytool -genkey -v \
            -keystore android-ci.keystore \
            -alias androidci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASS" \
            -keypass "$KEYSTORE_PASS" \
            -dname "CN=weknora"

      - name: Sign APK
        env:
          KEYSTORE_PASS: weknora123
        run: |
          ${ANDROID_SDK_ROOT}/build-tools/35.0.0/apksigner sign \
            --ks android-ci.keystore \
            --ks-pass pass:"$KEYSTORE_PASS" \
            --key-pass pass:"$KEYSTORE_PASS" \
            --ks-key-alias androidci \
            --out webview-app/app/build/outputs/apk/release/weknora-mobile-webview.apk \
            webview-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Verify APK
        run: |
          ls -la webview-app/app/build/outputs/apk/release/
          ${ANDROID_SDK_ROOT}/build-tools/35.0.0/aapt2 dump badging webview-app/app/build/outputs/apk/release/weknora-mobile-webview.apk | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: weknora-mobile-apk-${{ github.run_number }}
          path: webview-app/app/build/outputs/apk/release/weknora-mobile-webview.apk

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: webview-app/app/build/outputs/apk/release/weknora-mobile-webview.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to existing Release (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          files: webview-app/app/build/outputs/apk/release/weknora-mobile-webview.apk
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
