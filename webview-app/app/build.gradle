apply plugin: 'com.android.application'

// 自动版本号：主版本.次版本.commit次数
// 例如：commit 86 次 → 1.1.86
def getAutoVersion() {
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            commandLine 'git', 'rev-list', '--count', 'HEAD'
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        def count = stdout.toString().trim().toInteger()
        def major = 1
        def minor = 1
        def patch = count
        return "${major}.${minor}.${patch}"
    } catch (Exception e) {
        return '1.1.0'
    }
}

def getVersionCodeFromGit() {
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            commandLine 'git', 'rev-list', '--count', 'HEAD'
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        return stdout.toString().trim().toInteger()
    } catch (Exception e) {
        return 1
    }
}

android {
    namespace 'com.weknora.mobile'
    compileSdk 36

    defaultConfig {
        applicationId "com.weknora.mobile"
        minSdk 24
        targetSdk 36
        versionCode getVersionCodeFromGit()
        versionName getAutoVersion()
    }

    signingConfigs {
        release {
            // CI 构建使用 android-ci/ci.keystore（已提交到仓库）
            // 本地构建回退到 android/android.keystore
            def ciKeystore = file('../../android-ci/ci.keystore')
            if (ciKeystore.exists()) {
                storeFile ciKeystore
                storePassword 'weknora123'
                keyAlias 'cicert'
                keyPassword 'weknora123'
            } else {
                storeFile file('../../android/android.keystore')
                storePassword 'weknora123'
                keyAlias 'android'
                keyPassword 'weknora123'
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            lintOptions {
                checkReleaseBuilds false
                abortOnError false
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
