apply plugin: 'com.android.application'

android {
    namespace 'com.weknora.mobile'
    compileSdk 36

    defaultConfig {
        applicationId "com.weknora.mobile"
        minSdk 24
        targetSdk 36
        versionCode 21
        versionName "1.1.7"
    }

    signingConfigs {
        release {
            // CI 环境：使用环境变量指定的 keystore 路径
            // 本地环境：使用默认的 android/android.keystore
            def ciKeystore = System.getenv("CI_KEYSTORE_PATH")
            if (ciKeystore != null && file(ciKeystore).exists()) {
                storeFile file(ciKeystore)
                storePassword System.getenv("CI_KEYSTORE_PASSWORD") ?: 'weknora123'
                keyAlias System.getenv("CI_KEY_ALIAS") ?: 'androidci'
                keyPassword System.getenv("CI_KEY_PASSWORD") ?: 'weknora123'
            } else {
                storeFile file('../../android/android.keystore')
                storePassword 'weknora123'
                keyAlias 'android'
                keyPassword 'weknora123'
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            lintOptions {
                checkReleaseBuilds false
                abortOnError false
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
