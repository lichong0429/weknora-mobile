apply plugin: 'com.android.application'

// 从 git tag 自动获取版本号（如 v1.1.7 → versionName=1.1.7, versionCode=1001007）
def getVersionNameFromGit() {
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            commandLine 'git', 'describe', '--tags', '--always'
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        def tag = stdout.toString().trim()
        // 去掉 v 前缀
        if (tag.startsWith('v')) return tag.substring(1)
        return tag ?: '1.0.0'
    } catch (Exception e) {
        return '1.0.0'
    }
}

def getVersionCodeFromGit() {
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            commandLine 'git', 'rev-list', '--count', 'HEAD'
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        def count = stdout.toString().trim().toInteger()
        // 基础版本号 + commit 数量
        return 1000000 + count
    } catch (Exception e) {
        return 1
    }
}

android {
    namespace 'com.weknora.mobile'
    compileSdk 36

    defaultConfig {
        applicationId "com.weknora.mobile"
        minSdk 24
        targetSdk 36
        versionCode getVersionCodeFromGit()
        versionName getVersionNameFromGit()
    }

    signingConfigs {
        release {
            // CI 环境：使用环境变量指定的 keystore 路径
            // 本地环境：使用默认的 android/android.keystore
            def ciKeystore = System.getenv("CI_KEYSTORE_PATH")
            if (ciKeystore != null && file(ciKeystore).exists()) {
                storeFile file(ciKeystore)
                storePassword System.getenv("CI_KEYSTORE_PASSWORD") ?: 'weknora123'
                keyAlias System.getenv("CI_KEY_ALIAS") ?: 'androidci'
                keyPassword System.getenv("CI_KEY_PASSWORD") ?: 'weknora123'
            } else {
                storeFile file('../../android/android.keystore')
                storePassword 'weknora123'
                keyAlias 'android'
                keyPassword 'weknora123'
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            lintOptions {
                checkReleaseBuilds false
                abortOnError false
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
