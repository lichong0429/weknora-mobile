apply plugin: 'com.android.application'

// 自动版本号：从 1.1.7 开始，每次 Release 自动 +1
// 当前 commit 89，1.1.7 是 82 个 commit 时，所以差值是 7
// 版本 = 7 + (count - 82) = 7 + 7 = 14 → 1.1.14
// 等等，让我重新算... 1.1.7 是 82 个 commit，现在 89 个，差 7
// 所以版本 = 7 + 7 = 14，即 1.1.14
// 下次 commit 90 → 1.1.15
// 这样不对，应该是 1.1.7 → 1.1.8 → 1.1.9
// 让我换个方式：直接记录 1.1.7 对应的 commit 数，然后每次加 1

// 简单方案：手动维护基础版本，每次 Release 手动改这里
// 或者：从 git tag 获取上一个版本，然后 +1

def getAutoVersion() {
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            commandLine 'git', 'tag', '--list', 'v*', '--sort=-v:refname'
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        def tags = stdout.toString().trim().split('\n')
        def lastTag = tags[0].trim()
        if (lastTag.startsWith('v')) {
            def parts = lastTag.substring(1).split('\\.')
            if (parts.length >= 3) {
                def patch = parts[2].toInteger() + 1
                return "${parts[0]}.${parts[1]}.${patch}"
            }
        }
        return '1.1.8'
    } catch (Exception e) {
        return '1.1.8'
    }
}

def getVersionCodeFromGit() {
    def stdout = new ByteArrayOutputStream()
    try {
        exec {
            commandLine 'git', 'rev-list', '--count', 'HEAD'
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        return stdout.toString().trim().toInteger()
    } catch (Exception e) {
        return 1
    }
}

android {
    namespace 'com.weknora.mobile'
    compileSdk 36

    defaultConfig {
        applicationId "com.weknora.mobile"
        minSdk 24
        targetSdk 36
        versionCode getVersionCodeFromGit()
        versionName getAutoVersion()
    }

    signingConfigs {
        release {
            // CI 构建使用 android-ci/ci.keystore（已提交到仓库）
            // 本地构建回退到 android/android.keystore
            def ciKeystore = file('../../android-ci/ci.keystore')
            if (ciKeystore.exists()) {
                storeFile ciKeystore
                storePassword 'weknora123'
                keyAlias 'cicert'
                keyPassword 'weknora123'
            } else {
                storeFile file('../../android/android.keystore')
                storePassword 'weknora123'
                keyAlias 'android'
                keyPassword 'weknora123'
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            lintOptions {
                checkReleaseBuilds false
                abortOnError false
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
